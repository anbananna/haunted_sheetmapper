<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Google Sheet JSONP Map Template</title>

    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
<div id="map"></div>

<script>

var map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
    center: [-122.411, 37.785],
    zoom: 8
});

map.on('load', function () {
    var sheetScript = document.createElement('script');
    sheetScript.src =
        'https://docs.google.com/spreadsheets/d/15yYiOhob-9-zjK8jvsKIcaBTzI4smx0ALLcxQrdBip0/gviz/tq?tqx=out:json;responseHandler:handleGoogleSheetData&sheet=cal_haunted_places';
    document.head.appendChild(sheetScript);
});

function handleGoogleSheetData(response) {

    var columns = response.table.cols.map(function (column) {
        return column.label;
    });

    var features = response.table.rows.map(function (row) {

        var props = {};

        columns.forEach(function (columnName, index) {
            if (!columnName) return;
            props[columnName] = row.c[index] ? row.c[index].v : null;
        });

        return {
            type: 'Feature',
            geometry: {
                type: 'Point',
                coordinates: [
                    Number(props.longitude),
                    Number(props.latitude)
                ]
            },
            properties: props
        };
    });

    var geojson = {
        type: 'FeatureCollection',
        features: features
    };

    map.addSource('sheet-points', {
        type: 'geojson',
        data: geojson
    });

    map.addLayer({
        id: 'points',
        type: 'circle',
        source: 'sheet-points',
        paint: {
            'circle-radius': 6,
            'circle-color': 'purple'
        }
    });

    map.on('click', 'points', function (e) {
        var props = e.features[0].properties;

        var html =
            `<h3>${props.location}</h3><p>${props.description}</p>`;

        new maplibregl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(html)
            .addTo(map);
    });

    map.on('mouseenter', 'points', function () {
        map.getCanvas().style.cursor = 'pointer';
    });

    map.on('mouseleave', 'points', function () {
        map.getCanvas().style.cursor = '';
    });
}

</script>
</body>
</html>
